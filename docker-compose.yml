services:
  locusvision:
    build: .
    ports:
      - "8000:8000" # Backend API
      - "3000:3000" # Frontend
    volumes:
      - locusvision-data:/app/backend/data
      - /dev:/dev     # Auto-detect USB webcams + RTSP works out of the box
    device_cgroup_rules:
      - "c 81:* rmw"  # Allow video4linux devices
    group_add:
      - video
    env_file:
      - .env
    environment:
      - PORT=3000
    restart: unless-stopped

volumes:
  locusvision-data:
